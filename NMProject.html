<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini E-Commerce Cart System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#333;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.products, .cart{
    flex:1;
    min-width:300px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product{
    border:1px solid #ddd;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.cart-item{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

.quantity-btn{
    margin:0 5px;
}

.total{
    font-size:20px;
    font-weight:bold;
    margin-top:15px;
    color:green;
}
</style>
</head>

<body>

<h1>Mini E-Commerce Cart System</h1>

<div class="container">

    <div class="products">
        <h2>Products</h2>
        <div id="productList"></div>
    </div>

    <div class="cart">
        <h2>Shopping Cart</h2>
        <div id="cartItems"></div>
        <div class="total" id="totalPrice">
            Total: ₹0
        </div>
    </div>

</div>

<script>

const products = [
    {id:1, name:"Laptop", price:50000},
    {id:2, name:"Smartphone", price:20000},
    {id:3, name:"Headphones", price:2000},
    {id:4, name:"Smart Watch", price:5000}
];

let cart = [];

function displayProducts(){
    let productHTML = "";

    products.forEach(product=>{
        productHTML += `
        <div class="product">
            <h3>${product.name}</h3>
            <p>Price: ₹${product.price}</p>
            <button onclick="addToCart(${product.id})">
                Add to Cart
            </button>
        </div>
        `;
    });

    document.getElementById("productList").innerHTML = productHTML;
}

function addToCart(id){

    const product = products.find(p => p.id === id);

    const existing = cart.find(item => item.id === id);

    if(existing){
        existing.quantity++;
    }else{
        cart.push({...product, quantity:1});
    }

    updateCart();
}

function updateCart(){

    let cartHTML = "";
    let total = 0;

    cart.forEach(item => {

        total += item.price * item.quantity;

        cartHTML += `
        <div class="cart-item">
            <strong>${item.name}</strong><br>
            ₹${item.price} × ${item.quantity}

            <br><br>

            <button class="quantity-btn"
            onclick="changeQuantity(${item.id},-1)">-</button>

            <button class="quantity-btn"
            onclick="changeQuantity(${item.id},1)">+</button>

            <button onclick="removeItem(${item.id})">
            Remove
            </button>
        </div>
        `;
    });

    document.getElementById("cartItems").innerHTML = cartHTML;
    document.getElementById("totalPrice").innerHTML =
    `Total: ₹${total}`;
}

function changeQuantity(id,value){

    const item = cart.find(p => p.id === id);

    item.quantity += value;

    if(item.quantity <= 0){
        cart = cart.filter(p => p.id !== id);
    }

    updateCart();
}

function removeItem(id){

    cart = cart.filter(item => item.id !== id);

    updateCart();
}

displayProducts();

</script>

</body>
</html>
